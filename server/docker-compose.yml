services:
  db:
    image: postgres:16
    container_name: crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-crm}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-fastapi
    depends_on:
      - db
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-groq_api_keys_here}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-crm}
      - GROQ_PRIMARY_MODEL=${GROQ_PRIMARY_MODEL:-gemma2-9b-it}
      - GROQ_LARGE_MODEL=${GROQ_LARGE_MODEL:-llama-3.3-70b-versatile}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:5173"]}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app

volumes:
  postgres_data:
